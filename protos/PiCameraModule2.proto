#VRML_SIM R2025a utf8

PROTO PiCameraModule2 [
  field SFVec3f    translation 0 0 0
  field SFRotation rotation 0 1 0 0
  field SFString   name "pi_camera"
  field SFInt32    width 640
  field SFInt32    height 480
  field SFFloat    fieldOfView 1.04
]
{
  Camera {
    translation IS translation
    rotation IS rotation
    name IS name
    width IS width
    height IS height
    fieldOfView IS fieldOfView
    near 0.01
    children [
      Transform {
        translation 0 0 0
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.1 0.1 0.1
              roughness 0.8
              metalness 0
            }
            geometry Box {
              size 0.025 0.025 0.005
            }
          }
        ]
      }
    ]
  }
}